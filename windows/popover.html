<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AgentPet</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="pop">
    <div class="pop-card">
      <div class="pop-head">
        <img class="pop-appicon-img" src="/appicon.png" alt="AgentPet" />
        <div class="pop-meta">
          <b>AgentPet</b>
          <div class="cap" id="pop-sub">No agents running</div>
        </div>
      </div>

      <div class="pop-divider"></div>

      <div class="pop-sec">
        <span class="pop-sec-label" id="t-pop-agents">AGENTS</span>
        <button class="linklike" id="pop-clear" style="display:none">Clear all</button>
      </div>
      <div id="pop-list"></div>
      <div class="pop-empty cap" id="pop-empty">Nothing running right now.</div>

      <div class="pop-divider"></div>

      <label class="pop-row">
        <span class="ui-ic"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5.2" cy="10.2" r="2.1"/><circle cx="9.3" cy="6.4" r="2.2"/><circle cx="14.7" cy="6.4" r="2.2"/><circle cx="18.8" cy="10.2" r="2.1"/><path d="M12 10.5c-2.6 0-5.4 2.5-5.4 5 0 1.6 1.2 2.6 2.7 2.6 1 0 1.8-.4 2.7-.4s1.7.4 2.7.4c1.5 0 2.7-1 2.7-2.6 0-2.5-2.8-5-5.4-5z"/></svg></span>
        <span class="pop-label" id="t-pop-showpet">Show pet</span>
        <input type="checkbox" id="pop-showpet" />
      </label>
      <div class="pop-row">
        <span class="ui-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></span>
        <span class="pop-label" id="t-pop-size">Pet size</span>
        <input type="range" id="pop-size" min="70" max="130" />
      </div>

      <div class="pop-divider"></div>

      <div class="pop-foot">
        <button class="pop-fbtn" id="pop-settings">
          <span class="ui-ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></span>
          <span id="t-pop-settings">Settings</span>
        </button>
        <button class="pop-fbtn" id="pop-updates">
          <span class="ui-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg></span>
          <span id="t-pop-updates">Updates</span>
        </button>
        <span class="spacer"></span>
        <button class="pop-fbtn" id="pop-quit">
          <span class="ui-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></span>
          <span id="t-pop-quit">Quit</span>
        </button>
      </div>
    </div>
    <script type="module" src="/src/popover.ts"></script>
  </body>
</html>
