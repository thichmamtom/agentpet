<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentPet: Creator leaderboard</title>
<meta name="description" content="Top creators of community pets for AgentPet, ranked by downloads, likes and pets.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css">
<script src="/app.js" defer></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="brand" href="/"><img src="/icon.png" alt="">AgentPet</a>
    <nav class="nav">
      <a href="/pet/">Pets</a>
      <a href="/make/">Make</a>
      <a href="/creators/" class="active">Creators</a>
    </nav>
    <span class="spacer"></span>
    <span class="auth" id="auth"></span>
  </div>

  <section class="hero">
    <div class="eyebrow">Leaderboard</div>
    <h1>Top <span class="g">pet creators</span></h1>
    <p>The people making community pets for AgentPet, ranked by what the community loves.</p>
  </section>

  <div style="text-align:center"><div class="tabs">
    <button class="tab active" data-sort="downloads">Top downloads</button>
    <button class="tab" data-sort="likes">Top likes</button>
    <button class="tab" data-sort="pets">Most pets</button>
  </div></div>

  <div class="lb" id="list"></div>
  <div class="empty" id="empty" hidden>No creators yet. <a href="/pet/#add">Be the first.</a></div>
</div>

<script>
const $=s=>document.querySelector(s);
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
let sort='downloads';
const LABEL={downloads:'downloads',likes:'likes',pets:'pets'};
async function load(){
  const list=$('#list'),empty=$('#empty');list.innerHTML='';
  try{
    const d=await (await fetch('/api/creators?sort='+sort)).json();
    const cs=d.creators||[];empty.hidden=cs.length>0;
    list.innerHTML=cs.map((c,i)=>`
      <div class="row">
        <div class="rank">${i+1}</div>
        <img class="av" src="${esc(c.avatar||'')}" alt="">
        <div class="who">
          <div class="nm"><a href="/creator/${c.id}">${esc(c.name)}</a></div>
          <div class="meta">${c.pets} pets &middot; ${c.downloads} downloads &middot; ${c.likes} likes</div>
        </div>
        <div class="metric"><div class="big">${c[sort]}</div><div class="biglbl">${LABEL[sort]}</div></div>
      </div>`).join('');
  }catch{list.innerHTML='<div class="empty">Could not load the leaderboard.</div>';}
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  sort=t.dataset.sort;load();
});
/* show signed-in user in the bar */
(async()=>{let me=null;try{me=(await (await fetch('/api/me')).json()).user;}catch{}
  $('#auth').innerHTML=me?`<img class="av" src="${esc(me.avatar_url||'')}" alt=""><span class="uname">${esc(me.name)}</span>`:`<a class="signin" href="/pet/#add">Sign in</a>`;})();
load();
</script>
</body>
</html>
