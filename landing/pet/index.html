<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentPet: Community Pets</title>
<meta name="description" content="Browse community desktop pets for AgentPet, or make your own.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800;900&family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css">
<script src="/app.js" defer></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a class="brand" href="/"><img src="/icon.png" alt="">AgentPet</a>
    <nav class="nav">
      <a href="/pet/" class="active">Pets</a>
      <a href="/make/">Make</a>
      <a href="/creators/">Creators</a>
    </nav>
    <span class="spacer"></span>
    <span class="auth" id="auth"></span>
  </div>

  <div class="herowrap" id="herowrap">
    <div class="heromarquee" aria-hidden="true">
      <div class="mrow" id="mrow1"></div>
      <div class="mrow r2" id="mrow2"></div>
    </div>
    <section class="hero">
      <div class="index">// Pet registry &middot; online</div>
      <div class="word" data-text="AgentPet">AgentPet</div>
      <p class="lead">Neon pixel familiars for terminal-dwellers. Jack into the registry, snatch one, and let it glitch on your desktop while your <b>AI agents</b> grind through the night.</p>
      <div class="herocta">
        <a class="btn" href="/make/">Make a pet</a>
        <a class="btn sec" href="/">Get AgentPet</a>
      </div>
      <div class="strip" id="strip"></div>
    </section>
  </div>

  <div class="bleed">
  <h2 class="section-title" id="browse">Pick a pet</h2>
  <div class="sortbar">
    <label class="search">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="q" placeholder="Search by pet name or creator...">
    </label>
    <select class="sort" id="sort">
      <option value="new">Newest</option>
      <option value="downloads">Most installed</option>
      <option value="likes">Most liked</option>
      <option value="az">A to Z</option>
    </select>
  </div>
  <div class="browsebar">
    <div class="chips" id="chips">
      <button class="chip active" data-k="all">All</button>
      <button class="chip" data-k="character">Characters</button>
      <button class="chip" data-k="creature">Creatures</button>
      <button class="chip" data-k="object">Objects</button>
    </div>
    <span class="count" id="count"></span>
  </div>
  <div class="cardgrid" id="grid"></div>
  <div class="empty" id="empty" hidden>No pets match.</div>
  </div><!-- /bleed -->
</div>

<script>
const $=s=>document.querySelector(s);
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
const IC={
  heart:'<svg viewBox="0 0 24 24"><path d="M12 20.3l-1.3-1.2C5.4 14.4 2 11.3 2 7.6 2 5 4 3 6.6 3c1.5 0 2.9.7 3.8 1.8C11.3 3.7 12.7 3 14.2 3 16.8 3 18.8 5 18.8 7.6c0 3.7-3.4 6.8-8.7 11.5L12 20.3z"/></svg>',
  download:'<svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l4.5-4.5M12 15l-4.5-4.5M4 19v1a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-1"/></svg>',
  flag:'<svg viewBox="0 0 24 24"><path d="M5 21V4m0 0h11l-1.7 3.4L16 11H5"/></svg>',
  trash:'<svg viewBox="0 0 24 24"><path d="M4 7h16M10 7V4h4v3m-7 0v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V7"/></svg>'
};

/* hero marquee text */
(function(){
  const u1=('AGENTPET · ').repeat(14), u2=('PIXEL PETS · ').repeat(12);
  if($('#mrow1'))$('#mrow1').textContent=u1+u1; if($('#mrow2'))$('#mrow2').textContent=u2+u2;
})();

/* slice a sheet by transparent gutters (per-row), mirroring the app */
function sliceSheet(img){
  const w=img.naturalWidth,h=img.naturalHeight,TH=16;
  const cv=document.createElement('canvas');cv.width=w;cv.height=h;
  cv.getContext('2d').drawImage(img,0,0);
  const px=cv.getContext('2d').getImageData(0,0,w,h).data;
  const seg=a=>{const r=[];let s=null;for(let i=0;i<a.length;i++){if(a[i]&&s===null)s=i;else if(!a[i]&&s!==null){r.push([s,i]);s=null;}}if(s!==null)r.push([s,a.length]);return r;};
  const rowHas=new Array(h).fill(false);
  for(let y=0;y<h;y++){const rs=y*w*4;for(let x=0;x<w;x++){if(px[rs+x*4+3]>TH){rowHas[y]=true;break;}}}
  const clips=[];
  for(const[y0,y1]of seg(rowHas)){
    const colHas=new Array(w).fill(false);
    for(let x=0;x<w;x++){for(let y=y0;y<y1;y++){if(px[y*w*4+x*4+3]>TH){colHas[x]=true;break;}}}
    const row=seg(colHas).map(([x0,x1])=>({x:x0,y:y0,w:x1-x0,h:y1-y0}));
    if(row.length)clips.push(row);
  }
  return clips;
}

/* auth */
let me=null;
async function loadMe(){
  try{ me=(await (await fetch('/api/me')).json()).user; }catch{ me=null; }
  renderAuth();
}
function renderAuth(){
  const a=$('#auth');
  if(me){
    a.innerHTML=`<img class="av" src="${esc(me.avatar_url||'')}" alt=""><span class="uname">${esc(me.name)}</span> <button class="ghost" id="logout">Log out</button>`;
    $('#logout').onclick=async()=>{await fetch('/api/auth/logout',{method:'POST'});me=null;renderAuth();renderGrid();};
  }else{
    a.innerHTML=`<a class="signin" href="/api/auth/github/login">Sign in</a>`;
  }
}

/* gallery */
let allPets=[], curKind='all', curQ='', curSort='new';
async function report(slug){
  if(!confirm('Report this pet as inappropriate?'))return;
  await fetch(`/api/pets/${slug}/report`,{method:'POST'});alert('Thanks, reported.');
}
async function del(slug){
  if(!confirm('Delete this pet? This cannot be undone.'))return;
  const r=await fetch(`/api/pets/${slug}`,{method:'DELETE'});
  if(r.ok)load(); else alert('Could not delete this pet.');
}
async function likeCard(slug,el){
  if(!me){location.href='/api/auth/github/login';return;}
  const r=await fetch('/api/pets/'+slug+'/like',{method:'POST'});if(!r.ok)return;
  const d=await r.json();el.classList.toggle('liked',d.liked);el.querySelector('.n').textContent=d.likes;
  const p=allPets.find(x=>x.slug===slug);if(p)p.likes=d.likes;
}
function downloadPet(slug,url,el){
  fetch('/api/pets/'+slug+'/download',{method:'POST'}).catch(()=>{});
  const a=document.createElement('a');a.href=url;a.download=slug+'.png';document.body.appendChild(a);a.click();a.remove();
  const n=el.querySelector('.n');if(n){n.textContent=(+n.textContent+1);const card=el.closest('.pcard');const ins=card&&card.querySelector('.installs');if(ins)ins.innerHTML='&#8681; '+n.textContent;}
}

/* animate every pet thumbnail (strip + grid), first clip; cached per sheet */
let galleryCells=[], gtick=0;
const clipCache={};
function bindCanvas(cv){
  const url=cv.dataset.sheet;
  if(clipCache[url]){galleryCells.push({cv,img:clipCache[url].img,fr:clipCache[url].fr});return;}
  const img=new Image();img.onload=()=>{const c=sliceSheet(img);const fr=c[0];if(fr){clipCache[url]={img,fr};galleryCells.push({cv,img,fr});}};img.src=url;
}
function collectAnimators(){
  galleryCells=galleryCells.filter(c=>c.cv.isConnected);
  document.querySelectorAll('canvas.thumb').forEach(cv=>{ if(!galleryCells.some(c=>c.cv===cv)) bindCanvas(cv); });
}
setInterval(()=>{gtick++;galleryCells.forEach(({cv,img,fr})=>{
  const x=cv.getContext('2d');x.imageSmoothingEnabled=false;x.clearRect(0,0,cv.width,cv.height);
  const f=fr[gtick%fr.length];const s=Math.min(cv.width/f.w,cv.height/f.h)*0.86;const w=f.w*s,h=f.h*s;
  x.drawImage(img,f.x,f.y,f.w,f.h,(cv.width-w)/2,(cv.height-h)/2,w,h);
});},160);

function hnum(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}

function buildStrip(){
  const el=$('#strip');
  if(allPets.length<3){el.innerHTML='';return;}
  const top=[...allPets].sort((a,b)=>(b.downloads-a.downloads)||(b.likes-a.likes)).slice(0,5);
  const mid=Math.floor(top.length/2);
  el.innerHTML=top.map((p,i)=>`<a class="${i===mid?'feature':''}" href="/pet/${esc(p.slug)}" title="${esc(p.displayName)}">
    <canvas class="thumb" width="128" height="128" data-sheet="${esc(p.spritesheetUrl)}"></canvas>
    <span class="nm">${esc(p.displayName)}</span></a>`).join('');
  collectAnimators();
}
function sortPets(list){
  if(curSort==='downloads')return [...list].sort((a,b)=>b.downloads-a.downloads);
  if(curSort==='likes')return [...list].sort((a,b)=>b.likes-a.likes);
  if(curSort==='az')return [...list].sort((a,b)=>(a.displayName||'').localeCompare(b.displayName||''));
  return list;
}
function renderGrid(){
  const grid=$('#grid'),empty=$('#empty');
  let list=allPets;
  if(curKind!=='all')list=list.filter(p=>p.kind===curKind);
  if(curQ)list=list.filter(p=>(p.displayName||'').toLowerCase().includes(curQ)||(p.submittedBy||'').toLowerCase().includes(curQ));
  list=sortPets(list);
  $('#count').textContent=list.length?`${list.length} pet${list.length>1?'s':''}`:'';
  empty.hidden=list.length>0;
  grid.innerHTML=list.map(p=>{
    const owner=me&&p.creator&&p.creator.id===me.id;
    const hue=hnum(p.slug)%360, no=(hnum(p.slug)%899)+100;
    const av=p.creator&&p.creator.avatar?`<img src="${esc(p.creator.avatar)}" alt="">`:'';
    const desc=esc(p.description||`A ${p.kind||'character'} pet by ${p.submittedBy||'community'}.`);
    return `<div class="pcard" style="--hue:${hue}">
      <div class="bar"></div>
      <div class="phead"><span class="no">NO. ${no}</span></div>
      <a class="pview" href="/pet/${esc(p.slug)}">
        <canvas class="thumb" width="128" height="128" data-sheet="${esc(p.spritesheetUrl)}"></canvas>
        <span class="installs">${IC.download} ${p.downloads||0}</span>
      </a>
      <div class="pbody">
        <div class="prow"><span class="pname">${esc(p.displayName)}</span><span class="pkind">${esc(p.kind||'character')}</span></div>
        <p class="pdesc">${desc}</p>
        <div class="author">${av}by ${esc(p.submittedBy||'community')}</div>
        <div class="pfoot">
          <button class="act" onclick="likeCard('${esc(p.slug)}',this)" title="Like">${IC.heart} <span class="n">${p.likes||0}</span></button>
          <button class="act" onclick="downloadPet('${esc(p.slug)}','${esc(p.spritesheetUrl)}',this)" title="Download sheet">${IC.download} <span class="n">${p.downloads||0}</span></button>
          ${owner?`<button class="act del" onclick="del('${esc(p.slug)}')" title="Delete">${IC.trash}</button>`
                 :`<button class="act del" onclick="report('${esc(p.slug)}')" title="Report">${IC.flag}</button>`}
        </div>
      </div>
    </div>`;}).join('');
  collectAnimators();
}
async function load(){
  try{const d=await (await fetch('/api/pets')).json();allPets=d.pets||[];buildStrip();renderGrid();}
  catch{$('#grid').innerHTML='<div class="empty">Could not load pets.</div>';}
}
$('#q').oninput=e=>{curQ=e.target.value.trim().toLowerCase();renderGrid();};
$('#sort').onchange=e=>{curSort=e.target.value;renderGrid();};
$('#chips').onclick=e=>{const b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));b.classList.add('active');curKind=b.dataset.k;renderGrid();};
loadMe();
load();
</script>
</body>
</html>
