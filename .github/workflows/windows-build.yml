name: Windows build

# Builds the Windows installers (.msi + NSIS .exe) for the Tauri app in windows/.
# Trigger manually from the Actions tab (workflow_dispatch) to test, or push a
# tag like `win-v0.1.0` to also attach the installers to a GitHub release.
on:
  workflow_dispatch:
  push:
    tags:
      - "win-v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: windows/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: windows/src-tauri

      - name: Install frontend deps
        run: npm ci

      # On a win-v* tag, sign updater artifacts (needs the TAURI_SIGNING_PRIVATE_KEY
      # secret). Plain builds (workflow_dispatch) don't sign, so they work without it.
      - name: Build Tauri app (msi + nsis)
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          if [[ "${{ github.ref }}" == refs/tags/win-v* ]]; then
            npm run tauri build -- --config '{"bundle":{"createUpdaterArtifacts":true}}'
          else
            npm run tauri build
          fi

      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentpet-windows-installers
          path: |
            windows/src-tauri/target/release/bundle/nsis/*.exe
            windows/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Generate updater manifest (on win-v* tag)
        if: startsWith(github.ref, 'refs/tags/win-v')
        env:
          TAG: ${{ github.ref_name }}
        run: node scripts/make-latest-json.mjs

      - name: Attach installers + updater manifest to release (on win-v* tag)
        if: startsWith(github.ref, 'refs/tags/win-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/src-tauri/target/release/bundle/nsis/*-setup.exe
            windows/src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            windows/src-tauri/target/release/bundle/msi/*.msi
            windows/latest.json
